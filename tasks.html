<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROLEX - المهام الملكية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #0d1117; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 90px; }
        .gold-card { background: linear-gradient(135deg, #161b22 0%, #0d1117 100%); border: 1px solid #cda434; margin: 20px; padding: 25px; border-radius: 20px; text-align: center; box-shadow: 0 10px 30px rgba(205,164,52,0.1); }
        .balance-label { color: #8b949e; font-size: 14px; }
        .balance-amount { color: #cda434; font-size: 35px; font-weight: bold; margin: 10px 0; }
        .task-box { background: #161b22; margin: 20px; padding: 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.05); text-align: center; }
        .btn-collect { background: linear-gradient(45deg, #cda434, #f1c40f); color: #000; border: none; padding: 15px 40px; border-radius: 30px; font-weight: bold; width: 100%; cursor: pointer; transition: 0.3s; }
        .btn-collect:hover { transform: scale(1.05); }
        .bottom-nav { position: fixed; bottom: 15px; left: 15px; right: 15px; background: rgba(22,27,34,0.9); backdrop-filter: blur(10px); display: flex; justify-content: space-around; padding: 15px 0; border-radius: 25px; border: 1px solid rgba(205,164,52,0.3); }
        .nav-item { color: #8b949e; text-decoration: none; font-size: 11px; text-align: center; }
        .nav-item.active { color: #cda434; }
    </style>
</head>
<body>
    <div class="gold-card">
        <div class="balance-label">إجمالي الأصول المتراكمة</div>
        <div class="balance-amount" id="balance">0.00 USDT</div>
        <div style="font-size: 12px; color: #27ae60;">الربح التراكمي قيد التشغيل 🚀</div>
    </div>

    <div class="task-box">
        <i class="fab fa-youtube" style="font-size: 50px; color: #ff0000; margin-bottom: 15px;"></i>
        <h3 style="margin: 0;">مهمة جمع الأصول اليومية</h3>
        <p style="color: #8b949e; font-size: 13px;">المهمة القادمة متاحة الآن</p>
        <button class="btn-collect" onclick="alert('تم جمع الأرباح بنجاح!')">جمع الأصول الآن</button>
    </div>

    <nav class="bottom-nav">
        <a href="prices.html" class="nav-item"><i class="fas fa-chart-line" style="display:block; font-size:20px;"></i>الأسواق</a>
        <a href="deposit.html" class="nav-item"><i class="fas fa-wallet" style="display:block; font-size:20px;"></i>شحن</a>
        <a href="tasks.html" class="nav-item active"><i class="fas fa-tasks" style="display:block; font-size:20px;"></i>المهمة</a>
        <a href="withdraw.html" class="nav-item"><i class="fas fa-hand-holding-usd" style="display:block; font-size:20px;"></i>سحب</a>
        <a href="profile.html" class="nav-item"><i class="fas fa-user" style="display:block; font-size:20px;"></i>ملفي</a>
    </nav>
</body>
</html>
