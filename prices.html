<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROLEX - أسعار الأصول الحية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-light: #f4f7f6;
            --white: #ffffff;
            --sky-blue: #00a8ff;
            --dark-grey: #444;
            --up-green: #00c853;
            --down-red: #ff3d00;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-light);
            margin: 0;
            padding-bottom: 80px;
            color: var(--dark-grey);
        }

        .header {
            background: var(--white);
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid #eee;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header h1 { color: var(--sky-blue); margin: 0; font-size: 22px; }

        .price-container { padding: 15px; }

        /* كرت العملة */
        .price-card {
            background: var(--white);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            border: 1px solid #f0f0f0;
        }

        .coin-info { display: flex; align-items: center; }
        .coin-icon {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            margin-left: 15px;
            background: var(--bg-light);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            color: var(--sky-blue);
        }

        .coin-details h3 { margin: 0; font-size: 18px; color: #333; }
        .coin-details span { font-size: 12px; color: #999; }

        .coin-market { text-align: left; }
        .current-price { font-size: 18px; font-weight: bold; display: block; }
        .change-percent { font-size: 13px; font-weight: bold; }

        .up { color: var(--up-green); }
        .down { color: var(--down-red); }

        /* شريط التنقل السفلي */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: var(--white);
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            border-top: 1px solid #eee;
        }

        .nav-item { text-align: center; color: #aaa; text-decoration: none; font-size: 12px; }
        .nav-item.active { color: var(--sky-blue); }
        .nav-item i { font-size: 22px; display: block; margin-bottom: 5px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>ROLEX - الأسواق</h1>
    </div>

    <div class="price-container">
        <div class="price-card">
            <div class="coin-info">
                <div class="coin-icon"><i class="fas fa-dollar-sign"></i></div>
                <div class="coin-details">
                    <h3>USDT</h3>
                    <span>Tether USD</span>
                </div>
            </div>
            <div class="coin-market">
                <span class="current-price">$1.00</span>
                <span class="change-percent up">+0.01%</span>
            </div>
        </div>

        <div class="price-card">
            <div class="coin-info">
                <div class="coin-icon"><i class="fab fa-ethereum"></i></div>
                <div class="coin-details">
                    <h3>ETH</h3>
                    <span>Ethereum</span>
                </div>
            </div>
            <div class="coin-market">
                <span class="current-price" id="eth-price">جاري التحميل...</span>
                <span class="change-percent up" id="eth-change">+1.45%</span>
            </div>
        </div>

        <div class="price-card">
            <div class="coin-info">
                <div class="coin-icon"><i class="fas fa-frog"></i></div>
                <div class="coin-details">
                    <h3>PEPE</h3>
                    <span>Pepe Coin</span>
                </div>
            </div>
            <div class="coin-market">
                <span class="current-price" id="pepe-price">0.0000078</span>
                <span class="change-percent down">-2.30%</span>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="prices.html" class="nav-item active"><i class="fas fa-chart-line"></i>الأسعار</a>
        <a href="trade.html" class="nav-item"><i class="fas fa-exchange-alt"></i>التداول</a>
        <a href="tasks.html" class="nav-item"><i class="fas fa-tasks"></i>المهمة</a>
        <a href="profile.html" class="nav-item"><i class="fas fa-user"></i>ملفي الشخصي</a>
    </nav>

    <script>
        // دالة بسيطة لمحاكاة جلب الأسعار الحية (Live API لاحقاً)
        function fetchLivePrices() {
            // هنا نربط مع API مثل CoinGecko ليعطينا الأسعار حقيقية
            document.getElementById('eth-price').innerText = "$" + (Math.random() * (3500 - 3400) + 3400).toFixed(2);
            document.getElementById('pepe-price').innerText = (Math.random() * (0.0000080 - 0.0000070) + 0.0000070).toFixed(8);
        }

        setInterval(fetchLivePrices, 3000); // تحديث كل 3 ثواني
        fetchLivePrices();
    </script>
</body>
</html>
