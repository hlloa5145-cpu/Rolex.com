<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>ROLEX - شحن</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body onload="loadHistory('شحن', 'dep-hist')">
    <div style="padding:20px; text-align:center; font-size:24px; color:var(--gold-color);">إيداع الأصول الملكية</div>
    
    <div class="card-premium">
        <div style="color:var(--gold-color); margin-bottom:10px;">عنوان الإيداع (TRC20):</div>
        <div style="background:rgba(255,255,255,0.05); padding:10px; border-radius:8px; font-size:12px; word-break:break-all;">TA3uvkYmFmWhJ5DePkgWN8y1rVt6sxbpZB</div>
        <input type="number" id="amount" placeholder="المبلغ المشحون" style="width:100%; padding:12px; margin-top:10px; border-radius:8px; border:1px solid rgba(255,255,255,0.1); background:transparent; color:white;">
        <button class="btn-gold" onclick="submitTransaction('شحن', document.getElementById('amount').value)" style="margin-top:15px;">تأكيد الإيداع</button>
    </div>

    <div class="card-premium">
        <div style="color:var(--text-gray); margin-bottom:10px;">سجل الشحن:</div>
        <table style="width:100%; text-align:center;">
            <tbody id="dep-hist"></tbody>
        </table>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="api.js"></script>
</body>
</html>
