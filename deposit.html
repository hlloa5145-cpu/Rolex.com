<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROLEX - إيداع الأصول</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-light: #f4f7f6;
            --white: #ffffff;
            --sky-blue: #00a8ff;
            --dark-grey: #444;
            --light-blue: #e3f2fd;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-light);
            margin: 0;
            padding: 20px;
            color: var(--dark-grey);
        }

        .deposit-container {
            max-width: 500px;
            margin: 0 auto;
            background: var(--white);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }

        h2 { text-align: center; color: var(--sky-blue); margin-bottom: 30px; }

        /* تعليمات الإيداع */
        .instruction {
            background: var(--light-blue);
            padding: 15px;
            border-radius: 10px;
            font-size: 14px;
            margin-bottom: 20px;
            border-right: 5px solid var(--sky-blue);
        }

        /* كروت العناوين */
        .wallet-card {
            border: 1px solid #eee;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            background: #fafafa;
        }

        .network-name { font-weight: bold; color: var(--sky-blue); margin-bottom: 8px; display: block; }
        
        .address-box {
            display: flex;
            align-items: center;
            background: #fff;
            border: 1px dashed #ccc;
            padding: 10px;
            border-radius: 8px;
            font-size: 12px;
            word-break: break-all;
        }

        .copy-btn {
            background: var(--sky-blue);
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            margin-right: 10px;
            font-size: 12px;
        }

        /* فورم الرفع */
        .upload-section { margin-top: 25px; text-align: center; }
        .upload-section input[type="file"] { margin: 15px 0; }
        
        .submit-btn {
            width: 100%;
            background: var(--sky-blue);
            color: white;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .submit-btn:hover { background: #0097e6; }
    </style>
</head>
<body>

    <div class="deposit-container">
        <h2>إيداع أصول جديدة</h2>
        
        <div class="instruction">
            يرجى اختيار الشبكة المناسبة، نسخ العنوان، وبعد إتمام التحويل قم برفع صورة الإيصال ليتم تفعيل الأصول في حسابك.
        </div>

        <div class="wallet-card">
            <span class="network-name">شبكة TRC20 (USDT)</span>
            <div class="address-box">
                <button class="copy-btn" onclick="copyAddr('TA3uvkYmFmWhJ5DePkgWN8y1rVt6sxbpZB')">نسخ</button>
                <span>TA3uvkYmFmWhJ5DePkgWN8y1rVt6sxbpZB</span>
            </div>
        </div>

        <div class="wallet-card">
            <span class="network-name">شبكة BEP20 (USDT / ETH / PEPE)</span>
            <div class="address-box">
                <button class="copy-btn" onclick="copyAddr('0xd1e87dd1fabb7b64842dc7b00deb9c0db3aa55ac')">نسخ</button>
                <span>0xd1e87dd1fabb7b64842dc7b00deb9c0db3aa55ac</span>
            </div>
        </div>

        <div class="upload-section">
            <label>المبلغ المراد إيداعه:</label>
            <input type="number" id="dep-amount" placeholder="أدخل مبلغ الأصول" style="width:100%; padding:10px; margin:10px 0; border-radius:8px; border:1px solid #ddd;">
            
            <label>ارفع صورة إيصال التحويل:</label>
            <input type="file" id="proof-img" accept="image/*">
            
            <button class="submit-btn" onclick="submitDeposit()">تأكيد عملية الإيداع</button>
        </div>
    </div>

    <script>
        function copyAddr(text) {
            navigator.clipboard.writeText(text);
            alert("تم نسخ العنوان بنجاح!");
        }

        function submitDeposit() {
            const amount = document.getElementById('dep-amount').value;
            if(!amount) {
                alert("يرجى إدخال مبلغ الأصول أولاً");
                return;
            }
            // هنا يتم الربط مع Supabase لرفع الصورة وحفظ الطلب للأدمن
            alert("تم إرسال طلبك بنجاح! الأدمن سيراجع الأصول المشحونة قريباً.");
        }
    </script>
</body>
</html>
