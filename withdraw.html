<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>ROLEX - سحب</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body onload="loadHistory('سحب', 'with-hist')">
    <div style="padding:20px; text-align:center; font-size:24px; color:var(--gold-color);">سحب الأصول الملكية</div>
    
    <div class="card-premium">
        <input type="number" id="w-amount" placeholder="أدخل مبلغ السحب">
        <input type="text" id="w-wallet" placeholder="عنوان محفظتك (TRC20)">
        <button class="btn-gold" onclick="submitTransaction('سحب', document.getElementById('w-amount').value, document.getElementById('w-wallet').value)" style="margin-top:15px;">طلب السحب الملكي</button>
    </div>

    <div class="card-premium">
        <div style="color:var(--text-gray); margin-bottom:10px;">سجل السحب:</div>
        <table style="width:100%; text-align:center;">
            <tbody id="with-hist"></tbody>
        </table>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="api.js"></script>
</body>
</html>
