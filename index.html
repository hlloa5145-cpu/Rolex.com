<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROLEX - الدخول</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main-white: #ffffff; --light-grey: #f4f7f6; --sky-blue: #00a8ff; }
        body { font-family: sans-serif; background: var(--light-grey); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .auth-card { background: var(--main-white); padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); width: 350px; text-align: center; }
        .logo { font-size: 28px; font-weight: bold; color: var(--sky-blue); margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border-radius: 8px; border: none; background: var(--sky-blue); color: white; font-weight: bold; cursor: pointer; }
        p { font-size: 13px; color: var(--sky-blue); cursor: pointer; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="logo">ROLEX</div>
        <div id="login-form">
            <h3>تسجيل الدخول</h3>
            <input type="email" id="l-email" placeholder="البريد الإلكتروني">
            <input type="password" id="l-pass" placeholder="كلمة المرور">
            <button onclick="handleLogin(document.getElementById('l-email').value, document.getElementById('l-pass').value)">دخول</button>
            <p onclick="document.getElementById('login-form').style.display='none'; document.getElementById('reg-form').style.display='block';">إنشاء حساب جديد</p>
        </div>
        <div id="reg-form" style="display:none;">
            <h3>إنشاء حساب</h3>
            <input type="text" id="r-name" placeholder="الاسم الكامل">
            <input type="email" id="r-email" placeholder="البريد الإلكتروني">
            <input type="password" id="r-pass" placeholder="كلمة المرور">
            <input type="text" id="r-invite" placeholder="كود الدعوة">
            <button onclick="handleRegister(document.getElementById('r-name').value, document.getElementById('r-email').value, document.getElementById('r-pass').value, document.getElementById('r-invite').value)">تسجيل</button>
            <p onclick="location.reload()">لديك حساب؟ دخول</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="api.js"></script>
</body>
</html>
